spring:
  application:
    name: message_report

  datasource:
    url: jdbc:mysql://localhost:3306/apargo_report?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&rewriteBatchedStatements=true&useConfigs=maxPerformance
    username: root
    password: yuvraj@3933
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 2
      maximum-pool-size: 20        # must be >= NUM_THREADS (8) + a few for app requests
      idle-timeout: 300000
      connection-timeout: 30000
      data-source-properties:
        cachePrepStmts: true
        prepStmtCacheSize: 250
        prepStmtCacheSqlLimit: 2048
        useServerPrepStmts: false

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

server:
  port: 8080

logging:
  level:
    com.apargo.services.message_report: INFO
    org.hibernate.SQL: INFO
    org.hibernate.type.descriptor: INFO