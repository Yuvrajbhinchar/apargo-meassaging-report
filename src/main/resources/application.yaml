spring:
  application:
    name: message_report

  datasource:
    url: jdbc:mysql://localhost:3306/apargo_report?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: yuvraj@3933
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      connection-timeout: 20000

      data-source-properties:
        cachePrepStmts: true
        prepStmtCacheSize: 250
        prepStmtCacheSqlLimit: 2048
        useServerPrepStmts: true

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        # Batch inserts for broadcast recipients
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

server:
  port: 8080

logging:
  level:
    com.apargo.services.message_report: INFO
    org.hibernate.SQL: INFO        # set to INFO in prod
    org.hibernate.type.descriptor: INFO  # comment out in prod